<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="placeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1810;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#placeGrad)"/>
  <!-- Тарелка -->
  <ellipse cx="300" cy="220" rx="120" ry="120" fill="#3d2b1f" opacity="0.4"/>
  <ellipse cx="300" cy="220" rx="100" ry="100" fill="#4a3728" opacity="0.3"/>
  <ellipse cx="300" cy="220" rx="80" ry="80" fill="#5c4433" opacity="0.2"/>
  <!-- Вилка и нож -->
  <line x1="180" y1="150" x2="220" y2="250" stroke="#D4A853" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="150" x2="380" y2="250" stroke="#D4A853" stroke-width="2" opacity="0.3"/>
  <!-- Звёздочки -->
  <text x="300" y="180" font-size="24" fill="#D4A853" text-anchor="middle" opacity="0.3">✦</text>
  <text x="260" y="220" font-size="16" fill="#D4A853" text-anchor="middle" opacity="0.2">✦</text>
  <text x="340" y="220" font-size="16" fill="#D4A853" text-anchor="middle" opacity="0.2">✦</text>
  <!-- Текст -->
  <text x="300" y="320" font-family="Georgia, serif" font-size="18" fill="#D4A853" text-anchor="middle" letter-spacing="2">Фото блюда</text>
  <text x="300" y="345" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.3">Изображение: Блюдо</text>
</svg>
