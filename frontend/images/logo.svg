<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A853"/>
      <stop offset="100%" style="stop-color:#C49A3F"/>
    </linearGradient>
  </defs>

  <!-- Чашка кофе (иконка) -->
  <g transform="translate(5, 12)">
    <!-- Тело чашки -->
    <path d="M8,8 L8,28 C8,32 12,36 18,36 L32,36 C38,36 42,32 42,28 L42,8 Z"
          fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Ручка -->
    <path d="M42,14 C48,14 52,18 52,22 C52,26 48,30 42,30"
          fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Пар -->
    <path d="M18,4 C20,0 22,4 24,0 C26,4 28,0 30,4"
          fill="none" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <!-- Блюдце -->
    <path d="M4,38 L46,38 C48,38 48,42 46,42 L4,42 C2,42 2,38 4,38 Z"
          fill="url(#gold)" opacity="0.15"/>
  </g>

  <!-- Текст BEAN SCENE -->
  <text x="68" y="30" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="3">
    BEAN
    <tspan fill="#D4A853"> SCENE</tspan>
  </text>

  <!-- Подпись -->
  <text x="68" y="46" font-family="'Montserrat', Arial, sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="4" text-transform="uppercase">
    PREMIUM RESTAURANT
  </text>
</svg>
