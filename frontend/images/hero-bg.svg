<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  <rect width="1920" height="1080" fill="url(#overlay)"/>
  <!-- Декоративные круги -->
  <circle cx="300" cy="200" r="250" fill="#D4A853" opacity="0.05"/>
  <circle cx="1600" cy="800" r="300" fill="#D4A853" opacity="0.05"/>
  <circle cx="900" cy="500" r="400" fill="#D4A853" opacity="0.03"/>
  <!-- Линии -->
  <line x1="100" y1="900" x2="400" y2="900" stroke="#D4A853" stroke-width="2" opacity="0.3"/>
  <line x1="1520" y1="200" x2="1820" y2="200" stroke="#D4A853" stroke-width="2" opacity="0.3"/>
  <!-- Текст -->
  <text x="960" y="450" font-family="Georgia, serif" font-size="72" fill="#D4A853" text-anchor="middle" letter-spacing="4">ТОЧКА КИПЕНИЯ</text>
  <text x="960" y="520" font-family="Arial, sans-serif" font-size="24" fill="#fff" text-anchor="middle" letter-spacing="6" opacity="0.7">РЕСТОРАН &amp; КОФЕЙНЯ</text>
  <text x="960" y="600" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" opacity="0.5">Изображение: Интерьер ресторана</text>
</svg>
