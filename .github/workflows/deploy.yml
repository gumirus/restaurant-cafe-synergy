name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: railwayapp/actions/setup@v1
      - run: railway up --service restaurant-cafe-synergy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
